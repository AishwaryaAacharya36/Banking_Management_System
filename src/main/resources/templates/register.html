<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Customer Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background-color:#f2f2f2;">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">

                    <h3>Customer Registration</h3>

                </div>

                <div class="card-body">

                    <!-- SUCCESS MESSAGE -->

                    <div th:if="${successMessage}"
                         class="alert alert-success">

                        <span th:text="${successMessage}"></span>

                    </div>

                    <form th:action="@{/saveCustomer}"
                          th:object="${customer}"
                          method="post">

                        <!-- NAME -->

                        <div class="mb-3">

                            <label>Name</label>

                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control">

                            <small class="text-danger"
                                   th:errors="*{name}"></small>

                        </div>

                        <!-- EMAIL -->

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control">

                            <small class="text-danger"
                                   th:errors="*{email}"></small>

                        </div>

                        <!-- MOBILE -->

                        <div class="mb-3">

                            <label>Mobile</label>

                            <input type="text"
                                   th:field="*{mobile}"
                                   class="form-control">

                            <small class="text-danger"
                                   th:errors="*{mobile}"></small>

                        </div>

                        <!-- PASSWORD -->

                        <div class="mb-3">

                            <label>Password</label>

                            <input type="password"
                                   th:field="*{password}"
                                   class="form-control">

                            <small class="text-danger"
                                   th:errors="*{password}"></small>

                        </div>

                        <!-- ADDRESS -->

                        <div class="mb-3">

                            <label>Address</label>

                            <textarea th:field="*{address}"
                                      class="form-control"></textarea>

                        </div>

                        <div class="d-grid">

                            <button class="btn btn-primary">

                                Register

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
