<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Banking Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f5f5f5;
        }

        .hero-section{
            height:90vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .hero-section h1{
            font-size:55px;
            font-weight:bold;
            color:#0d6efd;
        }

        .hero-section p{
            font-size:20px;
        }

    </style>

</head>
<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="/">Banking Management System</a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Register</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Login</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- HERO SECTION -->

<div class="container">

    <div class="hero-section text-center">

        <h1>Welcome To Banking Management System</h1>

        <p class="mt-3">
            Secure Banking Application Using Spring Boot & Thymeleaf
        </p>

        <button class="btn btn-primary btn-lg mt-4">

        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
